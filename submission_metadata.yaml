ai_usage_summary: |
  Used Claude and ChatGPT/Codex for architecture discussion, code review, and implementation guidance.
  All scoring logic, skill taxonomies, and ranking algorithms are original work
  designed specifically for this challenge. No candidate data was fed to any LLM
  during the ranking process. The ranking step is fully offline with zero API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic 10-dimension calibrated ranker. A challenge-specific synthetic
  template prior (0.36) is combined with title/career fit, fast structured
  career-JD evidence, trajectory, assessments, experience, skills validation,
  logistics, and education. Behavioral signals are used once in a weighted
  availability modifier with explicit unreachable-candidate gates. Decisive
  cross-field integrity checks remove synthetic honeypots without broadly
  penalizing ordinary timeline noise. The submitted fast mode requires no
  pre-computation, GPU, model download, or network. For 100,000 candidates on
  CPU, measured runtime was 84.6s; a deterministic repeat took 82.3s and
  produced the identical SHA-256 hash
  5D3502CE69682631A433D3F7FD0E8A710CD01003B4E7FFE2B9648A3B8529B6A1.
  The official validator passes; zero detected
  honeypots and zero very-low-availability profiles in the submitted top 100.
  A clean Docker build reproduced the full output in 162.8s with the identical
  SHA-256 hash.

